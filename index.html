<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudra Link Shortener & HTML Host</title>
    <style>
        :root { --neon: #bc13fe; --bg: #0b0e14; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; }
        
        .container { max-width: 550px; margin: 0 auto; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { color: var(--neon); text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid rgba(188, 19, 254, 0.3); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; font-family: inherit; }
        textarea { height: 120px; resize: vertical; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; }
        
        /* File Upload Styling */
        .file-upload-wrapper { margin: 5px 0 10px; display: flex; align-items: center; gap: 10px; }
        .file-label { background: rgba(255, 255, 255, 0.1); padding: 10px 15px; border-radius: 8px; border: 1px dashed rgba(188, 19, 254, 0.5); cursor: pointer; font-size: 0.85rem; transition: 0.3s; display: inline-block; }
        .file-label:hover { background: rgba(188, 19, 254, 0.1); }
        #htmlFile { display: none; }

        /* Custom Slug Section Row */
        .slug-input-group { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        .slug-input-group input { margin: 0; flex: 1; }
        .auto-btn { width: auto; padding: 14px 20px; background: #00ffcc; color: #000; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .auto-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4); }

        button { width: 100%; padding: 14px; background: var(--neon); border: none; color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(188, 19, 254, 0.4); }

        .or-divider { text-align: center; margin: 15px 0; color: #555; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; }

        #historyContainer { display: flex; flex-direction: column; gap: 15px; }
        .history-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 18px; border-radius: 15px; transition: 0.3s; }
        
        .slug-row { display: flex; justify-content: space-between; align-items: center; }
        .slug-name { font-size: 1.1rem; font-weight: bold; color: #00ffcc; }
        
        /* Stats Chips */
        .stats-badges { display: flex; gap: 8px; }
        .click-count { color: #000; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        .badge-today { background: #ff007f; color: #fff; }
        .badge-life { background: #00ffcc; color: #000; }
        
        .link-url { font-size: 0.8rem; color: #888; word-break: break-all; margin: 10px 0; display: block; }
        .time-info { font-size: 0.65rem; color: #555; margin-bottom: 12px; line-height: 1.4; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-action { padding: 8px; font-size: 0.75rem; border-radius: 8px; text-align: center; cursor: pointer; border:none; color:white; }
        .copy-btn { background: #333; }
        .edit-btn { background: #e67e22; }
        .del-btn { background: #c0392b; }

        .hidden { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Blank Redirect Screen with exact Same App Background */
        #redirect-ui { background: var(--bg); border: none; box-shadow: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; margin: 0; border-radius: 0; z-index: 99999; }
    </style>
</head>
<body>

<div class="container">
    <div id="redirect-ui" class="hidden"></div>

    <div id="login-ui" class="card hidden">
        <h2>CREATE USERNAME</h2>
        <input type="text" id="usernameField" placeholder="@your_name">
        <button onclick="handleLogin()">Login</button>
    </div>

    <div id="dashboard-ui" class="hidden">
        <div class="header">
            <span id="userTag" style="color:var(--neon); font-weight:bold;"></span>
            <button onclick="handleLogout()" style="width:auto; padding:5px 12px; background:#222; font-size:0.7rem; color:white; border:none; border-radius:5px; cursor:pointer;">LOGOUT</button>
        </div>

        <div class="card">
            <h2 id="formTitle">RUDRA LINK SHORTENER</h2>
            
            <input type="url" id="longUrl" placeholder="Target URL (https://...)" oninput="toggleInputFields('url')">
            
            <div class="or-divider">─── OR PASTE HTML / UPLOAD FILE ───</div>
            
            <div class="file-upload-wrapper">
                <label for="htmlFile" class="file-label">📁 Choose HTML File</label>
                <input type="file" id="htmlFile" accept=".html" onchange="handleFileUpload(event)">
                <span id="fileNameDisplay" style="font-size:0.8rem; color:#aaa;">No file chosen</span>
            </div>

            <textarea id="htmlCodeInput" placeholder="<html>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>" oninput="toggleInputFields('html')"></textarea>

            <div class="slug-input-group">
                <input type="text" id="customSlug" placeholder="Custom Name (slug) or Auto Generate">
                <button type="button" class="auto-btn" onclick="generateRandomSlug()">Auto</button>
            </div>

            <button id="mainBtn" onclick="createNewLink()">Create Link</button>
            <button id="cancelEdit" class="hidden" onclick="resetForm()" style="background:#444;">Cancel Edit</button>
        </div>

        <h3 style="margin: 30px 0 15px; border-left: 4px solid var(--neon); padding-left: 10px;">Your History</h3>
        <div id="historyContainer"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, remove, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBjv193gNBhYKjXxk9Q4iHXqcVTHeD9IXM",
        authDomain: "watch-1b375.firebaseapp.com",
        databaseURL: "https://watch-1b375-default-rtdb.firebaseio.com",
        projectId: "watch-1b375",
        storageBucket: "watch-1b375.firebasestorage.app",
        messagingSenderId: "963767546203",
        appId: "1:963767546203:web:7788de1edf0a15c5a36a7e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let user = localStorage.getItem('active_username');
    let editingSlug = null;

    const getTodayKey = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    // --- Dynamic Routing Check & Redirection Logic (Slash Based) ---
    function checkRouting() {
        const currentPath = window.location.pathname;
        const segments = currentPath.split('/').filter(s => s && s !== 'index.html');
        
        if (segments.length > 0) {
            const possibleSlug = segments[segments.length - 1];
            
            // Show completely blank layout immediately
            document.getElementById('redirect-ui').classList.remove('hidden');
            
            get(ref(db, 'links/' + possibleSlug)).then(async (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    const todayKey = getTodayKey();
                    
                    const updates = {};
                    updates['links/' + possibleSlug + '/clicks'] = (data.clicks || 0) + 1;
                    updates['links/' + possibleSlug + '/dailyStats/' + todayKey] = ((data.dailyStats && data.dailyStats[todayKey]) || 0) + 1;
                    
                    await update(ref(db), updates);
                    const targetUrl = data.url;
                    
                    // Hold exactly for 0.1 second (100ms) before opening target contents
                    setTimeout(() => {
                        if(targetUrl.startsWith('data:text/html')) {
                            try {
                                const base64Code = targetUrl.split(',')[1];
                                document.open();
                                document.write(decodeURIComponent(escape(atob(base64Code))));
                                document.close();
                            } catch(e) {
                                alert("HTML Code Error!");
                            }
                        } else {
                            window.location.replace(targetUrl);
                        }
                    }, 100);
                    
                } else {
                    initializeDashboardUI();
                }
            }).catch(() => {
                initializeDashboardUI();
            });
        } else {
            initializeDashboardUI();
        }
    }

    function initializeDashboardUI() {
        document.getElementById('redirect-ui').classList.add('hidden');
        if (!user) {
            document.getElementById('login-ui').classList.remove('hidden');
        } else {
            startApp();
        }
    }

    // Execute routing process
    checkRouting();

    // --- Smart Input Toggle ---
    window.toggleInputFields = (source) => {
        const urlInput = document.getElementById('longUrl');
        const htmlInput = document.getElementById('htmlCodeInput');

        if (source === 'url' && urlInput.value.trim() !== "") {
            htmlInput.disabled = true;
            htmlInput.style.opacity = "0.3";
            document.getElementById('htmlFile').disabled = true;
        } else if (source === 'html' && htmlInput.value.trim() !== "") {
            urlInput.disabled = true;
            urlInput.style.opacity = "0.3";
        } else if (source === 'reset') {
            urlInput.disabled = false;
            htmlInput.disabled = false;
            urlInput.style.opacity = "1";
            htmlInput.style.opacity = "1";
            document.getElementById('htmlFile').disabled = false;
            document.getElementById('fileNameDisplay').innerText = "No file chosen";
            document.getElementById('htmlFile').value = "";
        }
    };

    // --- HTML File Reader ---
    window.handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        
        document.getElementById('fileNameDisplay').innerText = file.name;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('htmlCodeInput').value = e.target.result;
            toggleInputFields('html');
        };
        reader.readAsText(file);
    };

    // --- Auto Random Slug ---
    window.generateRandomSlug = () => {
        const characters = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let randomResult = '';
        for (let i = 0; i < 5; i++) {
            randomResult += characters.charAt(Math.floor(Math.random() * characters.length));
        }
        document.getElementById('customSlug').value = randomResult;
    };

    // --- Account Logic ---
    window.handleLogin = () => {
        let name = document.getElementById('usernameField').value.trim();
        if (name.length < 3) return alert("Username too short!");
        localStorage.setItem('active_username', name.startsWith('@') ? name : '@' + name);
        window.location.href = window.location.origin + window.location.pathname.split('/').filter(p => !p.endsWith('.html') && p !== '').join('/');
    };
    window.handleLogout = () => { 
        localStorage.removeItem('active_username'); 
        window.location.href = window.location.origin + window.location.pathname;
    };

    function startApp() {
        document.getElementById('dashboard-ui').classList.remove('hidden');
        document.getElementById('userTag').innerText = user;
        loadHistory();
    }

    // --- Create OR Update Link ---
    window.createNewLink = async () => {
        const url = document.getElementById('longUrl').value.trim();
        const htmlCode = document.getElementById('htmlCodeInput').value.trim();
        const slug = document.getElementById('customSlug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '');

        if (!url && !htmlCode) return alert("Please enter a Target URL OR Paste/Upload HTML code!");
        if (!slug) return alert("Custom Name (slug) is required!");

        let finalUrl = url;
        if (htmlCode) {
            if (htmlCode.length > 500000) return alert("HTML Code is too long! (Max 50KB allowed)");
            finalUrl = "data:text/html;base64," + btoa(unescape(encodeURIComponent(htmlCode)));
        }

        try {
            if (slug !== editingSlug) {
                const checkSnap = await get(ref(db, 'links/' + slug));
                if (checkSnap.exists()) return alert("This custom name is already taken!");
            }

            const payload = {
                url: finalUrl,
                owner: user,
                clicks: 0,
                dailyStats: {},
                created: new Date().toLocaleString(),
                updated: editingSlug ? new Date().toLocaleString() : "Never"
            };

            if (editingSlug) {
                const oldData = await get(ref(db, 'links/' + editingSlug));
                if (oldData.exists()) {
                    payload.clicks = oldData.val().clicks || 0;
                    payload.dailyStats = oldData.val().dailyStats || {};
                    payload.created = oldData.val().created;
                }
                if (editingSlug !== slug) {
                    await remove(ref(db, 'links/' + editingSlug));
                }
            }

            await set(ref(db, 'links/' + slug), payload);
            alert(editingSlug ? "Link Updated!" : "Link Created!");
            resetForm();
        } catch (e) { alert("Database Error!"); }
    };

    // --- History Loader with Live Stats ---
    function loadHistory() {
        onValue(ref(db, 'links'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            if (!data) return;

            const todayKey = getTodayKey();

            Object.keys(data).reverse().forEach(id => {
                if (data[id].owner === user) {
                    const item = data[id];
                    
                    let basePath = window.location.origin + window.location.pathname;
                    if (!basePath.endsWith('/')) basePath += '/';
                    const cleanLink = basePath + id;
                    
                    const displayUrl = item.url.startsWith('data:text/html') ? "📦 Custom HTML Webpage Code" : item.url;
                    const todayClicks = (item.dailyStats && item.dailyStats[todayKey]) ? item.dailyStats[todayKey] : 0;
                    const totalClicks = item.clicks || 0;

                    container.innerHTML += `
                        <div class="history-card">
                            <div class="slug-row">
                                <span class="slug-name">/${id}</span>
                                <div class="stats-badges">
                                    <span class="click-count badge-today">Today: ${todayClicks}</span>
                                    <span class="click-count badge-life">Lifetime: ${totalClicks}</span>
                                </div>
                            </div>
                            <span class="link-url">${displayUrl}</span>
                            <div class="time-info"><b>Created:</b> ${item.created}<br><b>Edited:</b> ${item.updated}</div>
                            <div class="action-btns">
                                <button class="btn-action copy-btn" onclick="copyToClipboard('${cleanLink}')">Copy</button>
                                <button class="btn-action edit-btn" onclick="startEdit('${id}', '${item.url}')">Edit</button>
                                <button class="btn-action del-btn" onclick="deleteLink('${id}')">Delete</button>
                            </div>
                        </div>`;
                }
            });
        });
    }

    // --- Action Helpers ---
    window.startEdit = (id, url) => {
        editingSlug = id;
        resetFormInputs();
        
        if(url.startsWith('data:text/html')) {
            try {
                const base64Code = url.split(',')[1];
                document.getElementById('htmlCodeInput').value = decodeURIComponent(escape(atob(base64Code)));
                toggleInputFields('html');
            } catch(e) {
                document.getElementById('htmlCodeInput').value = "Error decoding HTML code.";
            }
        } else {
            document.getElementById('longUrl').value = url;
            toggleInputFields('url');
        }

        document.getElementById('customSlug').value = id;
        document.getElementById('formTitle').innerText = "Editing: /" + id;
        document.getElementById('mainBtn').innerText = "Update & Save";
        document.getElementById('cancelEdit').classList.remove('hidden');
        window.scrollTo(0,0);
    };

    function resetFormInputs() {
        document.getElementById('longUrl').value = '';
        document.getElementById('htmlCodeInput').value = '';
        toggleInputFields('reset');
    }

    window.resetForm = () => {
        editingSlug = null;
        resetFormInputs();
        document.getElementById('customSlug').value = '';
        document.getElementById('formTitle').innerText = "RUDRA LINK SHORTENER";
        document.getElementById('mainBtn').innerText = "Create Link";
        document.getElementById('cancelEdit').classList.add('hidden');
    };

    window.deleteLink = async (id) => {
        if (confirm("Delete /" + id + "?")) await remove(ref(db, 'links/' + id));
    };

    // --- Absolute Robust Copy Engine Fixed ---
    window.copyToClipboard = (txt) => {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(txt).then(() => {
                alert("Link Copied!");
            }).catch(() => {
                fallbackCopy(txt);
            });
        } else {
            fallbackCopy(txt);
        }
    };

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        textArea.style.top = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            alert("Link Copied!");
        } catch (err) {
            alert("Copy failed, please long press the link.");
        }
        document.body.removeChild(textArea);
    }
</script>
</body>
</html>
